<!DOCTYPE html><html class="dark" lang="en"><head>
<meta charset="utf-8">
<meta content="width=device-width, initial-scale=1.0" name="viewport">
<title>SONIC Notification Redesign</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@600&amp;family=Space+Grotesk:wght@500;700&amp;display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "on-primary": "#ffffff",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#adc6ff",
                        "on-surface": "#1b1b1b",
                        "background": "#f9f9f9",
                        "inverse-surface": "#303030",
                        "surface-dim": "#dadada",
                        "primary-fixed-dim": "#4ae176",
                        "surface": "#f9f9f9",
                        "surface-container": "#eeeeee",
                        "inverse-primary": "#4ae176",
                        "tertiary-fixed": "#d8e2ff",
                        "tertiary": "#005ac2",
                        "on-secondary": "#ffffff",
                        "surface-container-low": "#f3f3f3",
                        "on-background": "#1b1b1b",
                        "error": "#ba1a1a",
                        "surface-tint": "#006e2f",
                        "on-secondary-fixed-variant": "#783200",
                        "on-primary-container": "#004b1e",
                        "primary": "#006e2f",
                        "outline-variant": "#bccbb9",
                        "on-tertiary-fixed-variant": "#004395",
                        "on-tertiary": "#ffffff",
                        "on-tertiary-container": "#003d88",
                        "on-secondary-fixed": "#341100",
                        "outline": "#6d7b6c",
                        "surface-variant": "#e2e2e2",
                        "surface-container-lowest": "#ffffff",
                        "surface-container-highest": "#e2e2e2",
                        "error-container": "#ffdad6",
                        "secondary": "#9d4300",
                        "on-primary-fixed": "#002109",
                        "surface-container-high": "#e8e8e8",
                        "secondary-fixed": "#ffdbca",
                        "inverse-on-surface": "#f1f1f1",
                        "primary-fixed": "#6bff8f",
                        "primary-container": "#22c55e",
                        "surface-bright": "#f9f9f9",
                        "on-tertiary-fixed": "#001a42",
                        "tertiary-container": "#82abff",
                        "on-primary-fixed-variant": "#005321",
                        "on-error": "#ffffff",
                        "on-surface-variant": "#3d4a3d",
                        "on-secondary-container": "#5c2400",
                        "secondary-container": "#fd761a",
                        "secondary-fixed-dim": "#ffb690"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "border-width": "3px",
                        "gutter": "1rem",
                        "shadow-offset": "4px",
                        "container-padding": "1.25rem"
                    },
                    "fontFamily": {
                        "headline-lg": ["Space Grotesk"],
                        "body-md": ["Space Grotesk"],
                        "body-lg": ["Space Grotesk"],
                        "label-mono": ["JetBrains Mono"],
                        "headline-md": ["Space Grotesk"]
                    },
                    "fontSize": {
                        "headline-lg": ["32px", { "lineHeight": "1.2", "letterSpacing": "-0.02em", "fontWeight": "700" }],
                        "body-md": ["16px", { "lineHeight": "1.5", "fontWeight": "500" }],
                        "body-lg": ["18px", { "lineHeight": "1.5", "fontWeight": "500" }],
                        "label-mono": ["12px", { "lineHeight": "1.0", "fontWeight": "600" }],
                        "headline-md": ["24px", { "lineHeight": "1.2", "fontWeight": "700" }]
                    }
                }
            }
        }
    </script>
<style>
        .neo-brutalist-border {
            border: 4px solid #000;
        }
        .neo-brutalist-shadow {
            box-shadow: 8px 8px 0px 0px rgba(0,0,0,1);
        }
        .slider-track {
            -webkit-appearance: none;
            width: 100%;
            height: 12px;
            background: #000;
            outline: none;
            border: 2px solid #000;
        }
        .slider-track::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 24px;
            height: 24px;
            background: #000;
            cursor: pointer;
            border: 2px solid #fff;
        }
        .slider-track::-moz-range-thumb {
            width: 24px;
            height: 24px;
            background: #000;
            cursor: pointer;
            border: 2px solid #fff;
        }
    </style>
</head>
<body class="bg-background min-h-screen flex items-center justify-center p-4">
<!-- Notification Container -->
<div class="w-full max-w-md bg-[#D4FF00] neo-brutalist-border neo-brutalist-shadow rounded-lg overflow-hidden flex flex-col relative z-10">
<!-- Header -->
<div class="flex items-center justify-between p-3 border-b-4 border-black bg-white">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-black font-bold" style="font-variation-settings: 'FILL' 1;">volume_up</span>
<span class="font-headline-md text-headline-md text-black tracking-tighter">SONIQ</span>
</div>
<div class="flex items-center gap-2">
<a class="font-label-mono text-label-mono text-black hover:underline uppercase" href="#">Open App</a>
<span class="material-symbols-outlined text-black">open_in_new</span>
</div>
</div>
<!-- Ringer Modes -->
<div class="flex justify-between gap-2 p-4 border-b-4 border-black bg-[#D4FF00]">
<!-- Sound Active -->
<button class="flex-1 flex flex-col items-center justify-center py-2 bg-primary-container text-black border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">volume_up</span>
<span class="font-label-mono text-label-mono uppercase">Sound</span>
</button>
<!-- Vibrate -->
<button class="flex-1 flex flex-col items-center justify-center py-2 bg-white text-black border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-surface-container hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">vibration</span>
<span class="font-label-mono text-label-mono uppercase">Vibrate</span>
</button>
<!-- Silent -->
<button class="flex-1 flex flex-col items-center justify-center py-2 bg-white text-black border-4 border-black shadow-[4px_4px_0px_0px_rgba(0,0,0,1)] hover:bg-surface-container hover:translate-x-[2px] hover:translate-y-[2px] hover:shadow-[2px_2px_0px_0px_rgba(0,0,0,1)] active:translate-x-[4px] active:translate-y-[4px] active:shadow-none transition-all">
<span class="material-symbols-outlined mb-1" style="font-variation-settings: 'FILL' 1;">volume_off</span>
<span class="font-label-mono text-label-mono uppercase">Silent</span>
</button>
</div>
<!-- Volume Sliders -->
<div class="flex flex-col gap-4 p-4 bg-white">
<!-- Media -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-black bg-[#D4FF00] p-1 border-2 border-black" style="font-variation-settings: 'FILL' 1;">music_note</span>
<div class="flex-1 relative flex items-center">
<input class="slider-track w-full z-10 relative bg-transparent" max="100" min="0" type="range" value="80">
<div class="absolute left-0 top-1/2 -translate-y-1/2 h-3 bg-primary-container z-0" style="width: 80%; border-top: 2px solid #000; border-bottom: 2px solid #000; border-left: 2px solid #000;"></div>
</div>
<span class="font-label-mono text-label-mono text-black w-8 text-right">80%</span>
</div>
<!-- Ring -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-black bg-[#D4FF00] p-1 border-2 border-black" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
<div class="flex-1 relative flex items-center">
<input class="slider-track w-full z-10 relative bg-transparent" max="100" min="0" type="range" value="60">
<div class="absolute left-0 top-1/2 -translate-y-1/2 h-3 bg-tertiary z-0" style="width: 60%; border-top: 2px solid #000; border-bottom: 2px solid #000; border-left: 2px solid #000;"></div>
</div>
<span class="font-label-mono text-label-mono text-black w-8 text-right">60%</span>
</div>
<!-- Alarm -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-black bg-[#D4FF00] p-1 border-2 border-black" style="font-variation-settings: 'FILL' 1;">alarm</span>
<div class="flex-1 relative flex items-center">
<input class="slider-track w-full z-10 relative bg-transparent" max="100" min="0" type="range" value="90">
<div class="absolute left-0 top-1/2 -translate-y-1/2 h-3 bg-secondary-container z-0" style="width: 90%; border-top: 2px solid #000; border-bottom: 2px solid #000; border-left: 2px solid #000;"></div>
</div>
<span class="font-label-mono text-label-mono text-black w-8 text-right">90%</span>
</div>
<!-- Call -->
<div class="flex items-center gap-3">
<span class="material-symbols-outlined text-black bg-[#D4FF00] p-1 border-2 border-black" style="font-variation-settings: 'FILL' 1;">call</span>
<div class="flex-1 relative flex items-center">
<input class="slider-track w-full z-10 relative bg-transparent" max="100" min="0" type="range" value="50">
<div class="absolute left-0 top-1/2 -translate-y-1/2 h-3 bg-tertiary-container z-0" style="width: 50%; border-top: 2px solid #000; border-bottom: 2px solid #000; border-left: 2px solid #000;"></div>
</div>
<span class="font-label-mono text-label-mono text-black w-8 text-right">50%</span>
</div>
</div>
</div>
<!-- Background reference image (hidden, just for requirement) -->
<div class="fixed inset-0 z-0 opacity-10 pointer-events-none" data-alt="A blurry screenshot of an old Android notification shade serving as a background reference." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuCLET5US3akTX4FZG8-8U6_eMbsmE3Xoo8cvXs1jAPHIHHsKyn8YJRsLqQqf6zKhIlyM9NONDljSgEVMA4wtAbPNUNWJROjNX8qyO3EnfQtDe3y1V_Tg657eUxNAy3H9PJXZiN0TMimH7ElQ4SfVAXAkbYPxESf_c6fTtFmd35jXeQ7qwQzijeRr1rLJUHOFPk9NYhHayirfHaAZz5o1lPl1Z9_w8Bk7ihuZjM9dYo4GYrGwIrmJa7Pk0gHuzMZitDZA49-N4DmfovX'); background-size: cover; background-position: center;"></div>
</body></html>

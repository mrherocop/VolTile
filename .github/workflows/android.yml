name: Android CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: voltile-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        tag_name: v2.1
        name: VolTile v2.1 Release
        body: |
          ### VolTile – Premium Volume Control Center

          #### Key Features:
          1. 📱 **Always-On Interactive Notification Panel** — Manage Media, Ring, Alarm, Notifications, and Voice Call volumes directly from your notification drawer/control center with dedicated +/- buttons and real-time visual progress bars.
          2. 🔊 **Ringer Mode Toggles** — Cycle through Sound, Vibrate, and Silent profiles instantly from the notification header or the main app.
          3. ✨ **Premium Dark UI Redesign** — Fully customized Glassmorphic navy dashboard layout featuring color-coded stream indicators, smooth animated sliders, and dynamic pulsing status indicators.
          4. ⚡ **Quick Settings Tile integration** — Tap the custom QS tile anytime to bring up the main control app.
          5. 🔋 **24/7 Service Persistence** — Sticky service with automated boot start receiver and system battery optimization ignoring support to stay alive forever.

          #### How to Install:
          1. Download the **`app-debug.apk`** from the assets section below.
          2. Install it on your Android device (Android 10+).
          3. Open the app and tap "Disable Battery Optimisation" to ensure continuous background operations.
          4. Add the **VolTile** tile to your Quick Settings panel!
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: Android CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: voltile-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        tag_name: v2.0
        name: VolTile v2.0 Release
        body: |
          ### Automated Build Release
          This is an automated build of VolTile generated by the CI/CD pipeline.

          #### How to Install:
          1. Download the **`app-debug.apk`** from the assets section below.
          2. Transfer it to your Android device (Android 10+) or download it directly.
          3. Tap the file to install (enable "Install from Unknown Sources" if prompted).
          4. Edit your Quick Settings panel to add the **VolTile** tile!
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}


name: Android CI/CD

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.2

    - name: Build with Gradle
      run: gradle assembleDebug

    - name: Upload Debug APK
      uses: actions/upload-artifact@v4
      with:
        name: soniq-debug-apk
        path: app/build/outputs/apk/debug/app-debug.apk

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
      uses: softprops/action-gh-release@v2
      with:
        files: app/build/outputs/apk/debug/app-debug.apk
        tag_name: v4.8-debug
        name: SONIQ v4.8-debug
        body: |
          ## SONIQ v4.8-debug — Global Crash Reporter 

          A complete UI overhaul with a **Neo-Brutalist** design language. Electric lime-yellow, bold black borders, and hard-edge shadows — a volume control app that actually looks good.

          #### ✨ What's New in v3.0:
          1. 🟡 **Brand new SONIQ identity** — Neo-brutalist lime + black design system (Space Grotesk font, offline bundled)
          2. 🎚️ **5 volume stream sliders** — Media, Ring, Alarm, Call, Notification with color-coded tracks
          3. 🔊 **Ringer mode buttons** — Ring (Magenta), Vibrate (Cyan), Silent (Purple) — selected mode stays visually pressed-in
          4. 📳 **Revamped notification panel** — Lime `#D4FF00` background, white header, SOUND/VIBRATE/SILENT buttons, 4 live sliders
          5. ⚡ **Quick Settings Tile** — Tap to open SONIQ instantly from your notification shade
          6. 🔋 **24/7 background service** — Auto-starts on boot, battery optimisation exempt prompt
          7. 📴 **100% offline** — All fonts (Space Grotesk, JetBrains Mono) and icons bundled in the APK

          #### How to Install:
          1. Download **`app-debug.apk`** from Assets below.
          2. Transfer to your Android device (Android 10+) and install.
          3. Enable **"Install from Unknown Sources"** if prompted.
          4. Open SONIQ → tap **"Disable Battery Optimisation"** for 24/7 reliability.
          5. Swipe down twice → edit Quick Settings → add the **Volume** tile!
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

